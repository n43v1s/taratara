<div id="log-fragment"
     {% if not done %}
     hx-get="/logs/{{ run_id }}/fragment"
     hx-trigger="every 2s"
     hx-swap="outerHTML"
     {% endif %}>
    <pre class="log-output" style="margin-top:0.75rem; max-height:400px; overflow-y:auto;">{{ log_text }}</pre>
    {% if done %}
    {% if redirect_url %}
    <p style="font-size:0.8rem; color:#94a3b8; margin-top:0.25rem;">{{ t('log_fragment.loading_result') }}</p>
    <script>setTimeout(function(){ window.location.href = "{{ redirect_url }}"; }, 800);</script>
    {% else %}
    <p style="font-size:0.8rem; color:#94a3b8; margin-top:0.25rem;">{{ t('log_fragment.done') }}</p>
    {% endif %}
    {% else %}
    <p style="font-size:0.8rem; color:#f59e0b; margin-top:0.25rem;">{{ t('log_fragment.polling') }}</p>
    {% endif %}
</div>
