<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tara Caraka Ceria{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css?v=2">
    <script src="/static/vendor/htmx.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-brand">Tara Caraka Ceria</div>
        <ul class="nav-links">
            <li><a href="/">{{ t('nav.dashboard') }}</a></li>
            <li><a href="/reset">{{ t('nav.reset') }}</a></li>
            <li><a href="/help">{{ t('nav.guide') }}</a></li>
            <li>
                <form method="post" action="/lang/set" style="display:inline;">
                    <input type="hidden" name="lang" value="{{ 'id' if lang == 'en' else 'en' }}">
                    <button type="submit" style="background:none;border:none;cursor:pointer;color:inherit;font-size:inherit;padding:0;text-decoration:underline dotted;">
                        {{ t('nav.lang_switch') }}
                    </button>
                </form>
            </li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <small>Tara Caraka Ceria — {{ t('footer.local_only') }} &middot; <a href="/health">health</a></small>
    </footer>
</body>
</html>
